services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:?Set APP_URL to your HTTPS domain, for example https://vault.example.com}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET to a long random value}
      DATABASE_PATH: /data/collection.sqlite
      HOST: 0.0.0.0
      PORT: ${PORT:-7317}
      UPLOADS_PATH: /data/uploads
      MAX_IMAGE_UPLOAD_BYTES: ${MAX_IMAGE_UPLOAD_BYTES:-6291456}
      PSA_USERNAME: ${PSA_USERNAME:-}
      PSA_PASSWORD: ${PSA_PASSWORD:-}
      PSA_ACCESS_TOKEN: ${PSA_ACCESS_TOKEN:-}
      POKEMONTCG_API_KEY: ${POKEMONTCG_API_KEY:-}
      ENABLE_EBAY_SCRAPER: ${ENABLE_EBAY_SCRAPER:-true}
      EBAY_MARKETPLACE: ${EBAY_MARKETPLACE:-EBAY_US}
      SCRAPER_DELAY_MS: ${SCRAPER_DELAY_MS:-2500}
      ENABLE_CGC_LOOKUP: ${ENABLE_CGC_LOOKUP:-true}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - collection-data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - api

volumes:
  collection-data:
